{% extends 'base.html' %}
{% block title %}Confirm Delete{% endblock %}
{% block extra_css %}
<style>
    .delete-card {
        background: white; border-radius: var(--radius); padding: 40px;
        box-shadow: var(--shadow); max-width: 500px; margin: 80px auto;
        text-align: center;
    }
    .delete-card i { font-size: 3rem; color: #e74c3c; margin-bottom: 16px; }
</style>
{% endblock %}
{% block content %}
<div class="container">
    <div class="delete-card">
        <i class="fas fa-exclamation-triangle"></i>
        <h3>Are you sure?</h3>
        <p class="text-muted">You are about to delete this {{ type }}:<br><strong>{{ object }}</strong></p>
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center mt-4">
                <button type="submit" class="btn btn-danger rounded-pill px-4"><i class="fas fa-trash me-2"></i>Delete</button>
                <a href="javascript:history.back()" class="btn btn-outline-gold">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
